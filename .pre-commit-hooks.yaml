- id: ctxray-lint
  name: ctxray lint
  description: Check AI prompt quality in session files
  entry: ctxray lint
  language: python
  pass_filenames: false
  always_run: true
  additional_dependencies: ["ctxray"]

- id: ctxray-lint-strict
  name: ctxray lint (strict)
  description: Check AI prompt quality — fail on warnings too
  entry: ctxray lint --strict
  language: python
  pass_filenames: false
  always_run: true
  additional_dependencies: ["ctxray"]

- id: ctxray-lint-score
  name: ctxray lint (score gate)
  description: Check AI prompt quality — fail if avg score below threshold
  entry: ctxray lint --score-threshold 50
  language: python
  pass_filenames: false
  always_run: true
  additional_dependencies: ["ctxray"]
