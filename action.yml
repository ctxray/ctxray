name: "ctxray lint"
description: "Check AI prompt quality in your codebase"
branding:
  icon: "zap"
  color: "blue"

inputs:
  version:
    description: "ctxray version to install"
    required: false
    default: "latest"
  source:
    description: "Adapter to scan (claude-code, aider, gemini, cline, cursor, openclaw)"
    required: false
    default: ""
  path:
    description: "Path to scan for session files"
    required: false
    default: ""
  strict:
    description: "Fail on warnings too (not just errors)"
    required: false
    default: "false"
  score-threshold:
    description: "Fail if average prompt score is below this threshold (0-100). Default 43 is experimentally validated — below it, 83% of prompts fail to produce correct output."
    required: false
    default: "0"
  model:
    description: "Target model for model-specific rules (claude, gpt, gemini)"
    required: false
    default: ""
  json:
    description: "Output results as JSON"
    required: false
    default: "false"
  comment-on-pr:
    description: "Post quality report as PR comment (requires pull_request event)"
    required: false
    default: "false"

outputs:
  errors:
    description: "Number of lint errors found"
    value: ${{ steps.lint.outputs.errors }}
  warnings:
    description: "Number of lint warnings found"
    value: ${{ steps.lint.outputs.warnings }}
  avg-score:
    description: "Average prompt score (when score-threshold > 0)"
    value: ${{ steps.lint.outputs.avg_score }}

runs:
  using: "composite"
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@v7

    - name: Install ctxray
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        if [ "$INPUT_VERSION" = "latest" ]; then
          uv tool install ctxray
        else
          uv tool install "ctxray==$INPUT_VERSION"
        fi

    - name: Scan sessions
      shell: bash
      env:
        INPUT_SOURCE: ${{ inputs.source }}
        INPUT_PATH: ${{ inputs.path }}
      run: |
        SCAN_ARGS=""
        if [ -n "$INPUT_SOURCE" ]; then
          SCAN_ARGS="$SCAN_ARGS --source $INPUT_SOURCE"
        fi
        if [ -n "$INPUT_PATH" ]; then
          SCAN_ARGS="$SCAN_ARGS --path $INPUT_PATH"
        fi
        ctxray scan $SCAN_ARGS || true

    - name: Run lint
      id: lint
      shell: bash
      env:
        INPUT_SOURCE: ${{ inputs.source }}
        INPUT_PATH: ${{ inputs.path }}
        INPUT_STRICT: ${{ inputs.strict }}
        INPUT_SCORE_THRESHOLD: ${{ inputs.score-threshold }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_JSON: ${{ inputs.json }}
      run: |
        LINT_ARGS=""
        if [ -n "$INPUT_SOURCE" ]; then
          LINT_ARGS="$LINT_ARGS --source $INPUT_SOURCE"
        fi
        if [ -n "$INPUT_PATH" ]; then
          LINT_ARGS="$LINT_ARGS --path $INPUT_PATH"
        fi
        if [ "$INPUT_STRICT" = "true" ]; then
          LINT_ARGS="$LINT_ARGS --strict"
        fi
        if [ "$INPUT_SCORE_THRESHOLD" != "0" ]; then
          LINT_ARGS="$LINT_ARGS --score-threshold $INPUT_SCORE_THRESHOLD"
        fi
        if [ -n "$INPUT_MODEL" ]; then
          LINT_ARGS="$LINT_ARGS --model $INPUT_MODEL"
        fi

        # Always get JSON for outputs + PR comment
        JSON_RESULT=$(ctxray lint --json $LINT_ARGS 2>/dev/null || echo '{"errors":0,"warnings":0}')
        echo "$JSON_RESULT" > /tmp/ctxray-lint.json

        echo "errors=$(echo "$JSON_RESULT" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("errors",0))')" >> "$GITHUB_OUTPUT"
        echo "warnings=$(echo "$JSON_RESULT" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("warnings",0))')" >> "$GITHUB_OUTPUT"
        echo "avg_score=$(echo "$JSON_RESULT" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("score",{}).get("avg_score",0))')" >> "$GITHUB_OUTPUT"

        # Run lint for display output
        if [ "$INPUT_JSON" = "true" ]; then
          ctxray lint --json $LINT_ARGS
        else
          ctxray lint $LINT_ARGS
        fi

    - name: Comment on PR
      if: inputs.comment-on-pr == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        INPUT_SOURCE: ${{ inputs.source }}
        INPUT_PATH: ${{ inputs.path }}
        INPUT_SCORE_THRESHOLD: ${{ inputs.score-threshold }}
      run: |
        # Generate PR comment markdown via ctxray CLI
        COMMENT_ARGS="--format github"
        if [ -n "$INPUT_SOURCE" ]; then
          COMMENT_ARGS="$COMMENT_ARGS --source $INPUT_SOURCE"
        fi
        if [ -n "$INPUT_PATH" ]; then
          COMMENT_ARGS="$COMMENT_ARGS --path $INPUT_PATH"
        fi
        if [ "$INPUT_SCORE_THRESHOLD" != "0" ]; then
          COMMENT_ARGS="$COMMENT_ARGS --score-threshold $INPUT_SCORE_THRESHOLD"
        fi

        COMMENT=$(ctxray lint $COMMENT_ARGS 2>/dev/null || echo "<!-- ctxray-lint -->
        ### 🔬 ctxray · ⚠️ Report generation failed
        ---
        <sub>Analyzed by <a href=\"https://github.com/ctxray/ctxray\">ctxray</a></sub>")

        # Find existing comment to update (avoid duplicates)
        EXISTING=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
          --jq '.[] | select(.body | contains("<!-- ctxray-lint -->")) | .id' \
          2>/dev/null | head -1)

        if [ -n "$EXISTING" ]; then
          gh api "repos/$REPO/issues/$PR_NUMBER/comments/$EXISTING" \
            -X PATCH -f body="$COMMENT" > /dev/null
        else
          gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            -f body="$COMMENT" > /dev/null
        fi

    - name: Add summary
      if: always()
      shell: bash
      run: |
        echo "## ctxray lint results" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "- Errors: ${{ steps.lint.outputs.errors }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- Warnings: ${{ steps.lint.outputs.warnings }}" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "Run \`ctxray lint\` locally for full details." >> "$GITHUB_STEP_SUMMARY"
