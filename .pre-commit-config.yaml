repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: pytest-check
        name: pytest
        entry: uv run pytest tests/ -x -q --tb=short
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
